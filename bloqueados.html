<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários Bloqueados | Connect Friends</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: white;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-card {
            animation: fadeInScale 0.4s ease forwards;
        }
    </style>
</head>
<body class="pb-10 custom-scroll">

    <div class="flex items-center justify-between px-6 py-6 sticky top-0 bg-[#0f172a]/90 backdrop-blur-lg z-50">
        <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white transition active:scale-90">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="text-center">
            <h2 class="text-lg font-black tracking-tight">Bloqueados</h2>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Gerenciar lista</p>
        </div>
        <div class="w-10"></div> 
    </div>

    <div class="px-6 max-w-2xl mx-auto space-y-4">
        
        <div class="p-4 rounded-3xl bg-blue-500/10 border border-blue-500/20 mb-6">
            <div class="flex items-center gap-3 justify-center">
                <i class="fa-solid fa-shield-halved text-blue-400 text-xs"></i>
                <p class="text-[11px] text-blue-300 font-bold uppercase tracking-wider">Privacidade Protegida</p>
            </div>
            <p class="text-[10px] text-slate-400 mt-2 leading-relaxed text-center font-medium">
                Pessoas nesta lista não podem ver seus momentos, enviar mensagens ou encontrar seu perfil no feed de exploração.
            </p>
        </div>

        <div id="lista-bloqueados" class="space-y-3">
            </div>

        <div id="empty-state" class="hidden py-32 text-center space-y-6">
            <div class="relative w-24 h-24 mx-auto">
                <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full"></div>
                <div class="relative w-24 h-24 bg-slate-900 rounded-full flex items-center justify-center border border-white/10 shadow-2xl">
                    <i class="fa-solid fa-user-check text-slate-600 text-4xl"></i>
                </div>
            </div>
            <div>
                <h3 class="text-slate-200 font-bold">Tudo limpo por aqui</h3>
                <p class="text-slate-500 text-xs mt-2 font-medium">Sua lista de bloqueados está vazia.</p>
            </div>
        </div>

    </div>

    <script>
        function carregarBloqueados() {
            const listaContainer = document.getElementById('lista-bloqueados');
            const emptyState = document.getElementById('empty-state');
            
            // Puxa a lista sincronizada
            const bloqueados = JSON.parse(localStorage.getItem('listaBloqueados')) || [];

            if (bloqueados.length === 0) {
                listaContainer.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            // Gera o HTML mantendo a integridade visual e os dados reais
            listaContainer.innerHTML = bloqueados.map((user, index) => `
                <div class="glass-card rounded-[2rem] p-4 flex items-center justify-between animate-card">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-2xl bg-slate-800 border border-white/10 flex items-center justify-center overflow-hidden shadow-inner">
                            ${user.foto ? 
                                `<img src="${user.foto}" class="w-full h-full object-cover">` : 
                                `<i class="fa-solid fa-user text-slate-600 text-xl"></i>`}
                        </div>
                        <div>
                            <h4 class="text-sm font-black text-white tracking-tight">${user.nome}</h4>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                                <span class="text-[9px] text-slate-500 font-black uppercase tracking-tighter">Desde ${user.data || 'Recente'}</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="desbloquear(this, ${index})" class="h-10 px-5 rounded-2xl bg-white/5 border border-white/10 text-[9px] font-black uppercase tracking-widest text-slate-300 hover:bg-blue-600 hover:text-white hover:border-blue-500 transition-all active:scale-90">
                        Desbloquear
                    </button>
                </div>
            `).join('');
        }

        function desbloquear(btn, index) {
            const card = btn.closest('.glass-card');
            
            if(confirm("Deseja desbloquear este usuário? Ele voltará a ter acesso à sua presença no Connect Friends.")) {
                
                let bloqueados = JSON.parse(localStorage.getItem('listaBloqueados')) || [];
                bloqueados.splice(index, 1);
                localStorage.setItem('listaBloqueados', JSON.stringify(bloqueados));

                // Animação de remoção suave
                card.style.transform = 'translateX(100px)';
                card.style.opacity = '0';
                
                setTimeout(() => {
                    carregarBloqueados();
                }, 300);
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', carregarBloqueados);
    </script>
</body>
</html>
