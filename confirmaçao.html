<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Friends | Verificação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .code-input { 
            width: 45px; 
            height: 55px; 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: bold; 
            background: #0f172a; 
            border: 2px solid #334155; 
            border-radius: 12px; 
            color: #2dd4bf; 
            transition: all 0.2s ease;
        }

        .code-input:focus { 
            border-color: #3b82f6; 
            outline: none; 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); 
            transform: scale(1.05);
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        /* Efeito de carregamento para o botão */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="w-full max-w-md p-6">
        <div class="glass-card rounded-[2.5rem] p-10 text-center">
            <div class="mb-6">
                <div class="w-16 h-16 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-shield-halved text-blue-400 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-black mb-2">Verifique seu E-mail</h2>
                <p class="text-slate-400 text-sm">Digite o código enviado para <br>
                    <span id="display-email" class="text-blue-400 font-bold"></span>
                </p>
            </div>
            
            <div class="flex justify-between gap-2 mb-8" id="otp-container">
                <input type="text" maxlength="1" class="code-input" autocomplete="one-time-code">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
            </div>

            <button id="btn-confirmar" onclick="verificarCodigo()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xs uppercase tracking-widest transition-all active:scale-[0.98]">
                Confirmar Identidade
            </button>

            <p class="mt-6 text-[10px] text-slate-500 uppercase font-bold tracking-widest">
                Não recebeu? <a href="#" onclick="reenviarCodigo()" class="text-blue-500 hover:underline">Reenviar código</a>
            </p>
        </div>
    </div>

    <script>
        // URL do seu servidor no Render
        const API_URL = 'https://connect-friends-api.onrender.com';

        const emailSalvo = localStorage.getItem('emailPendente');
        document.getElementById('display-email').innerText = emailSalvo || "seu e-mail";

        const inputs = document.querySelectorAll('.code-input');

        // Navegação automática
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.inputType === "deleteContentBackward") return;
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Função de Reenvio integrada ao seu novo Backend
        async function reenviarCodigo() {
            if (!emailSalvo) return;

            Swal.fire({
                title: 'Enviando...',
                text: 'Aguarde um momento',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const response = await fetch(`${API_URL}/enviar-codigo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailSalvo })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('codigoGerado', data.codigo);
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'Enviado!', 
                        text: 'Um novo código foi enviado para seu e-mail.',
                        background: '#1e293b', color: '#fff' 
                    });
                } else {
                    throw new Error(data.message || data.error);
                }
            } catch (error) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'Ops!', 
                    text: error.message || 'Erro ao conectar com o servidor.',
                    background: '#1e293b', color: '#fff' 
                });
            }
        }

        function verificarCodigo() {
            let codigoDigitado = "";
            inputs.forEach(input => codigoDigitado += input.value);
            
            const codigoCorreto = localStorage.getItem('codigoGerado');

            if (codigoDigitado.length < 6) {
                Swal.fire({ 
                    icon: 'warning', 
                    title: 'Incompleto', 
                    text: 'Digite os 6 números.', 
                    background: '#1e293b', color: '#fff'
                });
                return;
            }

            if (codigoDigitado == codigoCorreto) {
                sessionStorage.setItem('acessoPermitido', 'true');
                
                Swal.fire({ 
                    icon: 'success', 
                    title: 'Acesso Liberado!', 
                    timer: 1500, 
                    showConfirmButton: false,
                    background: '#1e293b', color: '#fff' 
                });
                
                localStorage.removeItem('codigoGerado');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'Código Errado', 
                    text: 'Tente novamente.', 
                    background: '#1e293b', color: '#fff'
                });
                inputs.forEach(input => input.value = "");
                inputs[0].focus();
            }
        }
    </script>
</body>
</html>
